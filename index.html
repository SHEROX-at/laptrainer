<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAP Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="center">

<div class="card">
  <div class="title">🚆 LAP Trainer</div>

  <input class="input" id="user" placeholder="Username">
  <input class="input" id="pass" type="password" placeholder="Passwort">
  <input class="input" id="code" placeholder="Code">

  <button class="btn" onclick="register()">Registrieren</button>
  <button class="btn btn2" onclick="login()">Login</button>

  <div class="hint">Zugang nur mit Code</div>
</div>

<script src="auth.js"></script>
</body>
</html>
