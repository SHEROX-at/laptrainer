<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAP Trainer</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen center">
  <div class="login-box">
    <h1>LAP Trainer</h1>

    <input id="name" placeholder="Username">
    <input id="pw" type="password" placeholder="Passwort">
    <input id="code" placeholder="Code">

    <button onclick="login()">Login</button>
    <button class="secondary" onclick="register()">Registrieren</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="title">Kategorien</span>
    <button class="logout" onclick="logout()">⎋</button>
  </div>

  <!-- CATEGORIES -->
  <div id="cats" class="list"></div>

  <!-- MODE -->
  <div id="mode" class="screen hidden">
    <div class="panel">
      <h2 id="catTitle"></h2>

      <button onclick="start('all')">Alle Fragen</button>
      <button onclick="start('wrong')">Nur falsche</button>
      <button onclick="start('exam')">🔥 Prüfung</button>

      <button class="secondary" onclick="back()">Zurück</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen hidden">
    <div class="quiz-box">

      <div class="progress">
        <div id="bar"></div>
      </div>

      <div id="progress"></div>
      <h2 id="q"></h2>

      <div id="answers"></div>

      <button class="secondary" onclick="back()">Zurück</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
