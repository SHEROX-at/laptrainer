<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAP Trainer</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="card">
    <h2>LAP Trainer</h2>

    <input id="name" placeholder="Username">
    <input id="pw" type="password" placeholder="Passwort">
    <input id="code" placeholder="Zugangscode">

    <button onclick="login()">Login</button>
    <button onclick="register()">Registrieren</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="topbar">
    <h2>Hallo <span id="user"></span></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div class="big-circle" id="bigCircle">0%</div>
    <p id="stats"></p>
  </div>

  <!-- KATEGORIEN -->
  <div id="cats"></div>

  <!-- MODE -->
  <div id="mode">
    <button onclick="start('all')">Alle Fragen</button>
    <button onclick="start('wrong')">Nur falsche</button>
    <button onclick="start('exam')">🔥 Prüfung</button>
    <button onclick="home()">Zurück</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="progress"><div id="bar" class="bar"></div></div>
    <div id="progress"></div>
    <h3 id="q"></h3>
    <div id="answers"></div>
    <button onclick="home()">Abbrechen</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
