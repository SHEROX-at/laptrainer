<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAP Trainer</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login" class="center">
  <div class="card">
    <h2>LAP Trainer</h2>

    <input id="name" placeholder="Username">
    <input id="pw" type="password" placeholder="Passwort">
    <input id="code" placeholder="Zugangscode">

    <button onclick="login()">Login</button>
    <button onclick="register()">Registrieren</button>

    <p class="hint">Nur mit Code zugänglich</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <h2>Hallo <span id="user"></span></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <p>🚀 Willkommen im LAP Trainer</p>
</div>

<script src="script.js"></script>
</body>
</html>
