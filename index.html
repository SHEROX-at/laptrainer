<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>LAP Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="center">

<div class="card">
  <div class="title">🚆 LAP Trainer</div>

  <input class="input" id="user" placeholder="Username">
  <input class="input" id="pass" type="password" placeholder="Passwort">
  <input class="input" id="code" placeholder="Zugangscode">

  <button class="btn" onclick="register()">Registrieren</button>
  <button class="btn btn2" onclick="login()">Login</button>

  <div style="margin-top:15px;font-size:12px;color:#64748b;text-align:center;">
    Zugang nur mit Code möglich
  </div>
</div>

<script src="auth.js"></script>

</body>
</html>
