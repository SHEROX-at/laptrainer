<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <span>🚆 LAP Trainer</span>
  <button class="btn2" onclick="logout()">Logout</button>
</div>

<div class="grid">

  <div class="big-card" onclick="startLearn()">
    <h3>📚 Lernen</h3>
    <p>Kategorien & Unterkategorien</p>
  </div>

  <div class="big-card" onclick="startExam()">
    <h3>🧠 Prüfung</h3>
    <p>Alle Fragen gemischt (80 Fragen)</p>
  </div>

  <div class="big-card" onclick="openPDF()">
    <h3>📄 Themenkatalog</h3>
    <p>Original PDF ansehen</p>
  </div>

</div>

<script src="app.js"></script>

<script>
if (!localStorage.getItem("user")) {
  window.location.href = "index.html";
}
</script>

</body>
</html>
