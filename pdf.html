<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>

  <!-- PDF.js direkt von CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #0b1225, #020617);
      color: white;
    }

    .topbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: rgba(20,30,60,0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    button {
      background: linear-gradient(135deg,#7c3aed,#9333ea);
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
    }

    input {
      flex: 1;
      padding: 8px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    #viewer {
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    canvas {
      width: 100%;
      max-width: 900px;
      border-radius: 12px;
    }

    .info {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <button onclick="back()">⬅</button>
  <input id="search" placeholder="Frage suchen...">
  <button onclick="search()">🔍</button>
</div>

<div id="viewer">
  <canvas id="pdf"></canvas>
</div>

<div class="info">
  Seite <span id="pageNum"></span> / <span id="pageCount"></span>
</div>

<script>
const url = "Themenkatalog_GBT_LAP.pdf"; // MUSS im public Ordner sein

let pdfDoc = null;
let pageNum = 1;
let scale = 1.3;

const canvas = document.getElementById("pdf");
const ctx = canvas.getContext("2d");

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {
    const viewport = page.getViewport({ scale });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

    document.getElementById("pageNum").textContent = num;
  });
}

function loadPDF() {
  pdfjsLib.getDocument(url).promise.then(pdf => {
    pdfDoc = pdf;
    document.getElementById("pageCount").textContent = pdf.numPages;
    renderPage(pageNum);
  });
}

function search() {
  const q = document.getElementById("search").value.toLowerCase();
  if (!q) return;

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    pdfDoc.getPage(i).then(page => {
      page.getTextContent().then(text => {
        const content = text.items.map(i => i.str).join(" ").toLowerCase();

        if (content.includes(q)) {
          pageNum = i;
          renderPage(pageNum);
        }
      });
    });
  }
}

function back() {
  window.location.href = "app.html";
}

// Swipe (Handy)
let startX = 0;

canvas.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

canvas.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50 && pageNum < pdfDoc.numPages) {
    pageNum++;
    renderPage(pageNum);
  }

  if (endX - startX > 50 && pageNum > 1) {
    pageNum--;
    renderPage(pageNum);
  }
});

loadPDF();
</script>

</body>
</html>
